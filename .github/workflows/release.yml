name: Release

# Builds the `morfeusz2` extension (crate `python/`) as wheels for every major
# platform and attaches them to a GitHub Release. Triggered by pushing a version
# tag (e.g. `v1.99.15`); `workflow_dispatch` builds the wheels without releasing
# so they can be downloaded from the run's artifacts.
#
# One forward-compatible abi3 wheel per platform covers CPython 3.9+. Free-
# threaded (no-GIL) interpreters get their own version-specific wheel
# automatically when built against a `3.14t` interpreter; testers on 3.14t can
# also build from the bundled sdist.
#
# Security hardening:
#   * Every third-party action is pinned to a full-length commit SHA (mutable
#     tags like `@v4` can be moved onto malicious commits — cf. the
#     tj-actions/changed-files supply-chain attack, CVE-2025-30066). The trailing
#     `# vX.Y.Z` comment is what Dependabot/Renovate bump.
#   * Least privilege: the default token is read-only; only the `release` job is
#     granted `contents: write`, and it never checks out the repo.
#   * `persist-credentials: false` keeps the build/sdist jobs from leaving a Git
#     credential in the workspace — they never push.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Read-only by default; the release job opts into write below.
permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: aarch64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          # `-m python/Cargo.toml` builds the workspace's python crate; maturin
          # reads python/pyproject.toml ([tool.maturin] module-name=morfeusz2).
          args: --release --out dist --manifest-path python/Cargo.toml
          # manylinux_2_28 (AlmaLinux 8 / GCC 12). The default manylinux2014
          # cross image ships a GCC too old to build libmimalloc-sys for aarch64
          # (`cc1: error: -Werror=date-time: no option -Wdate-time`). glibc 2.28
          # (2018) is a fine floor for test wheels.
          manylinux: '2_28'
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: macos-13      # Intel
            target: x86_64
          - runner: macos-14      # Apple Silicon
            target: aarch64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --manifest-path python/Cargo.toml
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        platform:
          - target: x64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --manifest-path python/Cargo.toml
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist --manifest-path python/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-22.04
    # Run even if some build legs fail so the release still gets the wheels that
    # did build; only publish for tag pushes (workflow_dispatch just builds).
    if: always() && startsWith(github.ref, 'refs/tags/')
    needs: [linux, macos, windows, sdist]
    permissions:
      contents: write   # create the Release and upload the wheel assets
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/*
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            Test wheels for **morfeusz2** — the Rust/PyO3 port of Morfeusz 2.

            abi3 wheels cover CPython **3.9+**; free-threaded (3.14t) testers can
            build from the bundled sdist (`pip install morfeusz2-*.tar.gz`).

            Install the wheel for your platform, e.g.:

            ```sh
            pip install https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/<wheel-file>
            ```

            Smoke test (needs an SGJP dictionary directory):

            ```python
            import morfeusz2
            m = morfeusz2.Morfeusz(dict_name="sgjp", dict_path="/path/to/sgjp-dict-dir")
            print(m.analyse("Ala ma kota"))
            ```
