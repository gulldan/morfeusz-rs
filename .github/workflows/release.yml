name: Release

# Builds the `morfeusz2` extension (crate `python/`) as wheels for every major
# platform and attaches them to a GitHub Release. Triggered by pushing a version
# tag (e.g. `v1.99.15`); `workflow_dispatch` builds the wheels without releasing
# so they can be downloaded from the run's artifacts.
#
# One forward-compatible abi3 wheel per platform covers CPython 3.9+. Free-
# threaded (no-GIL) interpreters get their own version-specific wheel
# automatically when built against a `3.14t` interpreter; testers on 3.14t can
# also build from the bundled sdist.
#
# Action versioning: pinned to specific release tags (e.g. `@v6.0.3`) so it is
# obvious which version each step runs. Note the trade-off: tags are mutable, so
# a compromised maintainer could move a tag onto a malicious commit (cf. the
# tj-actions/changed-files supply-chain attack, CVE-2025-30066). For the
# strongest supply-chain guarantee, pin to a full commit SHA instead
# (`uses: actions/checkout@<sha> # v6.0.3`). The rest of the hardening stays:
# read-only default token, persist-credentials: false, pinned runner images.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Read-only by default; the release job opts into write below.
permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: aarch64
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'
      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          # `-m python/Cargo.toml` builds the workspace's python crate; maturin
          # reads python/pyproject.toml ([tool.maturin] module-name=morfeusz2).
          args: --release --out dist --manifest-path python/Cargo.toml
          # manylinux_2_28 (AlmaLinux 8 / GCC 12). The default manylinux2014
          # cross image ships a GCC too old to build libmimalloc-sys for aarch64
          # (`cc1: error: -Werror=date-time: no option -Wdate-time`). glibc 2.28
          # (2018) is a fine floor for test wheels.
          manylinux: '2_28'
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: macos-13      # Intel
            target: x86_64
          - runner: macos-14      # Apple Silicon
            target: aarch64
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'
      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --manifest-path python/Cargo.toml
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        platform:
          - target: x64
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --manifest-path python/Cargo.toml
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Build sdist
        uses: PyO3/maturin-action@v1.51.0
        with:
          command: sdist
          args: --out dist --manifest-path python/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-22.04
    # Run even if some build legs fail so the release still gets the wheels that
    # did build; only publish for tag pushes (workflow_dispatch just builds).
    if: always() && startsWith(github.ref, 'refs/tags/')
    needs: [linux, macos, windows, sdist]
    permissions:
      contents: write   # create the Release and upload the wheel assets
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/*
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            Test wheels for **morfeusz2-rs** — the Rust/PyO3 drop-in port of
            Morfeusz 2. Installs as `morfeusz2-rs` and imports as `morfeusz2_rs`,
            so it coexists with the official `morfeusz2` without overwriting it.

            abi3 wheels cover CPython **3.9+**; free-threaded (3.14t) testers can
            build from the bundled sdist (`pip install morfeusz2_rs-*.tar.gz`).

            Install the wheel for your platform, e.g.:

            ```sh
            pip install https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/<wheel-file>
            ```

            Smoke test (needs an SGJP dictionary directory):

            ```python
            import morfeusz2_rs as morfeusz2
            m = morfeusz2.Morfeusz(dict_name="sgjp", dict_path="/path/to/sgjp-dict-dir")
            print(m.analyse("Ala ma kota"))
            ```
